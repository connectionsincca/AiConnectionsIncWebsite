<svg viewBox="0 0 700 400" xmlns="http://www.w3.org/2000/svg" font-family="'DM Mono',monospace">
<defs>
  <filter id="cg"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="cg2"><feGaussianBlur stdDeviation="12" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="cg3"><feGaussianBlur stdDeviation="24" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <radialGradient id="city-b" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#a8caff"/>
    <stop offset="100%" stop-color="#4d96ff"/>
  </radialGradient>
  <radialGradient id="city-r" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#ff9999"/>
    <stop offset="100%" stop-color="#ff4040"/>
  </radialGradient>
  <radialGradient id="bg-grad" cx="50%" cy="40%" r="60%">
    <stop offset="0%" stop-color="#0b0820"/>
    <stop offset="100%" stop-color="#03010a"/>
  </radialGradient>
</defs>

<!-- Background -->
<rect width="700" height="400" fill="url(#bg-grad)"/>

<!-- Starfield -->
<g fill="white" opacity="0.25">
  <circle cx="50" cy="30" r="0.8"/><circle cx="120" cy="15" r="0.6"/><circle cx="200" cy="45" r="1"/>
  <circle cx="300" cy="20" r="0.7"/><circle cx="420" cy="35" r="0.9"/><circle cx="540" cy="18" r="0.6"/>
  <circle cx="640" cy="40" r="0.8"/><circle cx="680" cy="12" r="0.5"/><circle cx="80" cy="80" r="0.6"/>
  <circle cx="180" cy="90" r="0.7"/><circle cx="600" cy="75" r="0.8"/><circle cx="660" cy="85" r="0.5"/>
</g>

<!-- Canada landmass (simplified silhouette) -->
<path d="
  M 30,120
  C 40,100 60,90 90,88
  C 120,86 150,82 200,75
  C 240,70 280,65 320,68
  C 360,71 400,70 440,68
  C 480,66 520,62 560,65
  C 600,68 640,72 670,80
  L 670,95
  C 655,100 640,105 620,108
  C 600,111 580,115 555,120
  C 540,125 525,130 510,135
  L 505,155
  C 500,165 495,175 490,180
  L 485,195
  C 480,200 475,205 465,208
  C 455,211 445,210 435,210
  L 430,215
  C 425,220 420,225 415,230
  L 410,250
  C 408,260 405,270 400,275
  C 395,280 388,282 380,282
  L 375,290
  C 370,298 360,305 350,308
  C 340,311 330,310 322,308
  L 318,312
  C 312,318 305,322 295,324
  C 285,326 275,325 268,322
  L 262,328
  C 255,335 245,340 232,342
  L 225,348
  C 218,353 210,356 200,356
  C 190,356 182,352 176,346
  L 170,340
  C 163,333 158,328 150,326
  C 142,324 135,326 128,330
  L 120,335
  C 112,340 104,343 95,342
  C 86,341 78,336 72,330
  L 65,322
  C 58,314 52,308 44,306
  L 38,308
  C 30,308 22,305 16,300
  L 12,288
  C 9,278 8,268 9,258
  L 12,240
  C 14,228 16,216 18,204
  L 20,185
  C 21,173 22,162 24,152
  L 26,138
  Z"
  fill="rgba(255,255,255,0.025)"
  stroke="rgba(255,255,255,0.08)"
  stroke-width="0.8"
/>

<!-- Province boundary hints (faint) -->
<line x1="158" y1="75" x2="155" y2="310" stroke="rgba(255,255,255,0.04)" stroke-width="0.6"/>
<line x1="240" y1="68" x2="238" y2="308" stroke="rgba(255,255,255,0.04)" stroke-width="0.6"/>
<line x1="330" y1="68" x2="328" y2="270" stroke="rgba(255,255,255,0.04)" stroke-width="0.6"/>
<line x1="450" y1="68" x2="448" y2="195" stroke="rgba(255,255,255,0.04)" stroke-width="0.6"/>

<!-- ── Connection lines between cities ── -->
<!-- Vancouver — Calgary -->
<line x1="95" y1="250" x2="200" y2="258" stroke="rgba(77,150,255,0.22)" stroke-width="1.2" stroke-dasharray="6,4"/>
<!-- Calgary — Winnipeg -->
<line x1="200" y1="258" x2="355" y2="268" stroke="rgba(77,150,255,0.18)" stroke-width="1" stroke-dasharray="6,4"/>
<!-- Winnipeg — Toronto -->
<line x1="355" y1="268" x2="488" y2="258" stroke="rgba(77,150,255,0.18)" stroke-width="1" stroke-dasharray="6,4"/>
<!-- Toronto — Ottawa -->
<line x1="488" y1="258" x2="525" y2="242" stroke="rgba(77,150,255,0.22)" stroke-width="1.2"/>
<!-- Ottawa — Montreal -->
<line x1="525" y1="242" x2="575" y2="240" stroke="rgba(77,150,255,0.22)" stroke-width="1.2"/>
<!-- Montreal — Halifax -->
<line x1="575" y1="240" x2="648" y2="232" stroke="rgba(77,150,255,0.18)" stroke-width="1" stroke-dasharray="6,4"/>
<!-- Vancouver — Toronto (long arc) -->
<path d="M95,250 Q290,155 488,258" fill="none" stroke="rgba(199,125,255,0.12)" stroke-width="1.2" stroke-dasharray="8,5"/>
<!-- Toronto — Halifax (arc) -->
<path d="M488,258 Q568,200 648,232" fill="none" stroke="rgba(199,125,255,0.10)" stroke-width="1" stroke-dasharray="6,5"/>
<!-- Calgary — Toronto (arc) -->
<path d="M200,258 Q345,178 488,258" fill="none" stroke="rgba(0,212,255,0.08)" stroke-width="0.8" stroke-dasharray="5,6"/>

<!-- ── Data pulses along routes ── -->
<!-- Van → Cal -->
<circle r="3" fill="#4d96ff" filter="url(#cg)">
  <animateMotion path="M95,250 L200,258" dur="2.8s" repeatCount="indefinite" begin="0s"/>
</circle>
<circle r="2" fill="#4d96ff" opacity="0.6">
  <animateMotion path="M95,250 L200,258" dur="2.8s" repeatCount="indefinite" begin="1.4s"/>
</circle>
<!-- Cal → Win -->
<circle r="3" fill="#4d96ff" filter="url(#cg)">
  <animateMotion path="M200,258 L355,268" dur="3.5s" repeatCount="indefinite" begin="0.5s"/>
</circle>
<!-- Win → Tor -->
<circle r="3" fill="#4d96ff" filter="url(#cg)">
  <animateMotion path="M355,268 L488,258" dur="3.2s" repeatCount="indefinite" begin="1s"/>
</circle>
<!-- Tor → Ott -->
<circle r="3" fill="#7ab4ff" filter="url(#cg)">
  <animateMotion path="M488,258 L525,242" dur="1.8s" repeatCount="indefinite" begin="0.2s"/>
</circle>
<!-- Ott → Mon -->
<circle r="3" fill="#7ab4ff" filter="url(#cg)">
  <animateMotion path="M525,242 L575,240" dur="1.5s" repeatCount="indefinite" begin="0.8s"/>
</circle>
<!-- Mon → Hal -->
<circle r="3" fill="#4d96ff" filter="url(#cg)">
  <animateMotion path="M575,240 L648,232" dur="2.4s" repeatCount="indefinite" begin="0.3s"/>
</circle>
<!-- Long arc Van → Tor -->
<circle r="2.5" fill="#c77dff" filter="url(#cg)">
  <animateMotion path="M95,250 Q290,155 488,258" dur="6s" repeatCount="indefinite" begin="1s" calcMode="spline" keySplines="0.42 0 0.58 1"/>
</circle>
<!-- Reverse Tor → Hal -->
<circle r="2" fill="#d4a8ff" filter="url(#cg)">
  <animateMotion path="M488,258 Q568,200 648,232" dur="4s" repeatCount="indefinite" begin="2s"/>
</circle>

<!-- ── City dots ── -->
<!-- Vancouver -->
<circle cx="95" cy="250" r="22" fill="rgba(77,150,255,0.06)" filter="url(#cg2)"/>
<circle cx="95" cy="250" r="8" fill="rgba(77,150,255,0.15)">
  <animate attributeName="r" values="8;14;8" dur="3s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.4;0;0.4" dur="3s" repeatCount="indefinite"/>
</circle>
<circle cx="95" cy="250" r="5.5" fill="url(#city-b)" filter="url(#cg)">
  <animate attributeName="opacity" values="0.8;1;0.8" dur="2.4s" repeatCount="indefinite"/>
</circle>
<text x="95" y="240" text-anchor="middle" font-size="8.5" fill="rgba(255,255,255,0.55)" letter-spacing="0.5">VANCOUVER</text>
<text x="95" y="230" text-anchor="middle" font-size="7" fill="rgba(77,150,255,0.5)">BC</text>

<!-- Calgary -->
<circle cx="200" cy="258" r="18" fill="rgba(77,150,255,0.06)" filter="url(#cg2)"/>
<circle cx="200" cy="258" r="7" fill="rgba(77,150,255,0.12)">
  <animate attributeName="r" values="7;12;7" dur="2.8s" begin="0.5s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.4;0;0.4" dur="2.8s" begin="0.5s" repeatCount="indefinite"/>
</circle>
<circle cx="200" cy="258" r="5" fill="url(#city-b)" filter="url(#cg)">
  <animate attributeName="opacity" values="0.8;1;0.8" dur="2.2s" begin="0.5s" repeatCount="indefinite"/>
</circle>
<text x="200" y="248" text-anchor="middle" font-size="8.5" fill="rgba(255,255,255,0.55)" letter-spacing="0.5">CALGARY</text>
<text x="200" y="238" text-anchor="middle" font-size="7" fill="rgba(77,150,255,0.5)">AB</text>

<!-- Winnipeg -->
<circle cx="355" cy="268" r="16" fill="rgba(77,150,255,0.06)" filter="url(#cg2)"/>
<circle cx="355" cy="268" r="6" fill="rgba(77,150,255,0.12)">
  <animate attributeName="r" values="6;11;6" dur="3.2s" begin="1s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.4;0;0.4" dur="3.2s" begin="1s" repeatCount="indefinite"/>
</circle>
<circle cx="355" cy="268" r="4.5" fill="url(#city-b)" filter="url(#cg)"/>
<text x="355" y="258" text-anchor="middle" font-size="8.5" fill="rgba(255,255,255,0.55)" letter-spacing="0.5">WINNIPEG</text>
<text x="355" y="248" text-anchor="middle" font-size="7" fill="rgba(77,150,255,0.5)">MB</text>

<!-- Toronto (largest — HQ area) -->
<circle cx="488" cy="258" r="28" fill="rgba(199,125,255,0.07)" filter="url(#cg3)"/>
<circle cx="488" cy="258" r="11" fill="rgba(199,125,255,0.15)">
  <animate attributeName="r" values="11;18;11" dur="2.6s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.4;0;0.4" dur="2.6s" repeatCount="indefinite"/>
</circle>
<circle cx="488" cy="258" r="7" fill="#c77dff" filter="url(#cg)">
  <animate attributeName="opacity" values="0.85;1;0.85" dur="1.8s" repeatCount="indefinite"/>
  <animate attributeName="r" values="6.5;8;6.5" dur="1.8s" repeatCount="indefinite"/>
</circle>
<text x="488" y="246" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.75)" letter-spacing="0.5" font-weight="600">TORONTO</text>
<text x="488" y="236" text-anchor="middle" font-size="7" fill="rgba(199,125,255,0.65)">HQ · ON</text>

<!-- Ottawa -->
<circle cx="525" cy="242" r="15" fill="rgba(77,150,255,0.06)" filter="url(#cg2)"/>
<circle cx="525" cy="242" r="5.5" fill="rgba(77,150,255,0.12)">
  <animate attributeName="r" values="5.5;10;5.5" dur="3s" begin="1.5s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.4;0;0.4" dur="3s" begin="1.5s" repeatCount="indefinite"/>
</circle>
<circle cx="525" cy="242" r="4" fill="url(#city-b)" filter="url(#cg)"/>
<text x="525" y="230" text-anchor="middle" font-size="8.5" fill="rgba(255,255,255,0.55)" letter-spacing="0.5">OTTAWA</text>
<text x="525" y="220" text-anchor="middle" font-size="7" fill="rgba(77,150,255,0.5)">ON</text>

<!-- Montreal -->
<circle cx="575" cy="240" r="20" fill="rgba(77,150,255,0.06)" filter="url(#cg2)"/>
<circle cx="575" cy="240" r="8" fill="rgba(77,150,255,0.12)">
  <animate attributeName="r" values="8;14;8" dur="2.9s" begin="0.8s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.4;0;0.4" dur="2.9s" begin="0.8s" repeatCount="indefinite"/>
</circle>
<circle cx="575" cy="240" r="5.5" fill="url(#city-b)" filter="url(#cg)">
  <animate attributeName="opacity" values="0.8;1;0.8" dur="2.2s" begin="0.8s" repeatCount="indefinite"/>
</circle>
<text x="575" y="228" text-anchor="middle" font-size="8.5" fill="rgba(255,255,255,0.55)" letter-spacing="0.5">MONTRÉAL</text>
<text x="575" y="218" text-anchor="middle" font-size="7" fill="rgba(77,150,255,0.5)">QC</text>

<!-- Halifax -->
<circle cx="648" cy="232" r="14" fill="rgba(77,150,255,0.06)" filter="url(#cg2)"/>
<circle cx="648" cy="232" r="5" fill="rgba(77,150,255,0.12)">
  <animate attributeName="r" values="5;10;5" dur="3.4s" begin="1.2s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.4;0;0.4" dur="3.4s" begin="1.2s" repeatCount="indefinite"/>
</circle>
<circle cx="648" cy="232" r="4" fill="url(#city-b)" filter="url(#cg)"/>
<text x="648" y="220" text-anchor="middle" font-size="8.5" fill="rgba(255,255,255,0.55)" letter-spacing="0.5">HALIFAX</text>
<text x="648" y="210" text-anchor="middle" font-size="7" fill="rgba(77,150,255,0.5)">NS</text>

<!-- ── Title / Badge ── -->
<rect x="16" y="358" width="200" height="28" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="0.8"/>
<circle cx="30" cy="372" r="4" fill="#ff4040">
  <animate attributeName="opacity" values="1;0.4;1" dur="1.8s" repeatCount="indefinite"/>
</circle>
<text x="40" y="376" font-size="8.5" fill="rgba(255,255,255,0.5)" letter-spacing="1">SERVING ALL OF CANADA</text>

<!-- Active connections count -->
<rect x="16" y="16" width="170" height="24" rx="5" fill="rgba(77,150,255,0.08)" stroke="rgba(77,150,255,0.2)" stroke-width="0.8"/>
<circle cx="28" cy="28" r="3.5" fill="#4d96ff">
  <animate attributeName="opacity" values="1;0.3;1" dur="1.2s" repeatCount="indefinite"/>
</circle>
<text x="38" y="33" font-size="8" fill="rgba(77,150,255,0.8)" letter-spacing="1">7 CITIES · CONNECTED</text>

</svg>
