    <text x="193" y="354" text-anchor="middle" font-size="7.5" fill="rgba(255,255,255,0.22)">JAN</text>

    <!-- Feb -->
    <rect x="220" y="340" width="34" height="0" rx="3" fill="url(#bar-b)">
      <animate attributeName="height" from="0" to="108" dur="1s" begin="0.5s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1"/>
      <animate attributeName="y" from="340" to="232" dur="1s" begin="0.5s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1"/>
    </rect>
    <text x="237" y="354" text-anchor="middle" font-size="7.5" fill="rgba(255,255,255,0.22)">FEB</text>

    <!-- Mar -->
    <rect x="264" y="340" width="34" height="0" rx="3" fill="url(#bar-b)">
      <animate attributeName="height" from="0" to="98" dur="1s" begin="0.7s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1"/>
      <animate attributeName="y" from="340" to="242" dur="1s" begin="0.7s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1"/>
    </rect>
    <text x="281" y="354" text-anchor="middle" font-size="7.5" fill="rgba(255,255,255,0.22)">MAR</text>

    <!-- Apr -->
    <rect x="308" y="340" width="34" height="0" rx="3" fill="url(#bar-v)">
      <animate attributeName="height" from="0" to="122" dur="1s" begin="0.9s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1"/>
      <animate attributeName="y" from="340" to="218" dur="1s" begin="0.9s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1"/>
    </rect>
    <text x="325" y="354" text-anchor="middle" font-size="7.5" fill="rgba(255,255,255,0.22)">APR</text>

    <!-- May -->
    <rect x="352" y="340" width="34" height="0" rx="3" fill="url(#bar-v)">
      <animate attributeName="height" from="0" to="115" dur="1s" begin="1.1s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1"/>
      <animate attributeName="y" from="340" to="225" dur="1s" begin="1.1s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1"/>
    </rect>
    <text x="369" y="354" text-anchor="middle" font-size="7.5" fill="rgba(255,255,255,0.22)">MAY</text>

    <!-- Jun -->
    <rect x="396" y="340" width="34" height="0" rx="3" fill="url(#bar-c)">
      <animate attributeName="height" from="0" to="136" dur="1s" begin="1.3s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1"/>
      <animate attributeName="y" from="340" to="204" dur="1s" begin="1.3s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1"/>
    </rect>
    <text x="413" y="354" text-anchor="middle" font-size="7.5" fill="rgba(255,255,255,0.22)">JUN</text>

    <!-- Jul — record high bar with glow -->
    <rect x="440" y="340" width="34" height="0" rx="3" fill="url(#bar-c)" filter="url(#dg)">
      <animate attributeName="height" from="0" to="132" dur="1s" begin="1.5s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1"/>
      <animate attributeName="y" from="340" to="208" dur="1s" begin="1.5s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1"/>
    </rect>
    <text x="457" y="354" text-anchor="middle" font-size="7.5" fill="rgba(255,255,255,0.22)">JUL</text>
    <!-- "Best month" badge -->
    <rect x="438" y="196" width="38" height="14" rx="3" fill="rgba(107,203,119,0.2)" stroke="rgba(107,203,119,0.35)" stroke-width="0.8" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="2.6s" fill="freeze"/>
    </rect>
    <text x="457" y="207" text-anchor="middle" font-size="6.5" fill="#6bcb77" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="2.6s" fill="freeze"/>
      BEST
    </text>
  </g>

  <!-- ── Line chart ── -->
  <text x="548" y="196" font-size="8" fill="rgba(255,255,255,0.28)" letter-spacing="2">GROWTH</text>
  <line x1="548" y1="204" x2="548" y2="340" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <line x1="548" y1="340" x2="685" y2="340" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Line path -->
  <path d="M548,318 L566,305 L584,298 L602,282 L620,268 L638,255 L656,238 L674,220 L685,208"
    stroke="url(#line-g)" stroke-width="2" fill="none" stroke-linecap="round"
    stroke-dasharray="260" stroke-dashoffset="260">
    <animate attributeName="stroke-dashoffset" from="260" to="0" dur="2.2s" begin="1s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </path>

  <!-- Area fill -->
  <path d="M548,318 L566,305 L584,298 L602,282 L620,268 L638,255 L656,238 L674,220 L685,208 L685,340 L548,340 Z"
    fill="url(#line-g)" opacity="0.08">
    <animate attributeName="opacity" from="0" to="0.08" dur="2.2s" begin="1s" fill="freeze"/>
  </path>

  <!-- End dot -->
  <circle cx="685" cy="208" r="4" fill="#c77dff" filter="url(#dg)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.2s" fill="freeze"/>
    <animate attributeName="r" values="4;6;4" dur="2s" begin="3.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Live indicator -->
  <circle cx="665" cy="192" r="3.5" fill="#6bcb77" filter="url(#dg)">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <text x="672" y="196" font-size="7.5" fill="rgba(107,203,119,0.7)">LIVE</text>

  <!-- Decorative right column divider -->
  <line x1="536" y1="176" x2="536" y2="375" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Bottom status bar -->
  <rect x="118" y="406" width="581" height="34" fill="#0a0a1a"/>
  <line x1="118" y1="406" x2="699" y2="406" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="136" y="426" font-size="7.5" fill="rgba(255,255,255,0.2)" letter-spacing="1">LAST SYNC: 2 MIN AGO</text>
  <circle cx="250" cy="422" r="3" fill="#6bcb77">
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="258" y="426" font-size="7.5" fill="rgba(107,203,119,0.5)" letter-spacing="1">ALL SYSTEMS OPERATIONAL</text>
  <text x="670" y="426" text-anchor="end" font-size="7.5" fill="rgba(255,255,255,0.15)" letter-spacing="1">v2.4.1</text>
</g>
</svg>
