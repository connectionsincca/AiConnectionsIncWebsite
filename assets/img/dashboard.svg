  <rect x="400" y="92" width="120" height="72" rx="8" fill="rgba(107,203,119,0.07)" stroke="rgba(107,203,119,0.2)" stroke-width="1"/>
  <rect x="400" y="92" width="120" height="3" rx="1.5" fill="#6bcb77" opacity="0.5"/>
  <text x="414" y="111" font-size="7.5" fill="rgba(255,255,255,0.35)" letter-spacing="1.5">HRS SAVED</text>
  <text x="414" y="137" font-size="24" font-family="'Space Grotesk',sans-serif" font-weight="700" fill="#fff">847</text>
  <text x="414" y="155" font-size="7.5" fill="#6bcb77">↑ This week</text>

  <!-- Card 4: Satisfaction -->
  <rect x="532" y="92" width="155" height="72" rx="8" fill="rgba(255,217,60,0.07)" stroke="rgba(255,217,60,0.18)" stroke-width="1"/>
  <rect x="532" y="92" width="155" height="3" rx="1.5" fill="#ffd93d" opacity="0.5"/>
  <text x="546" y="111" font-size="7.5" fill="rgba(255,255,255,0.35)" letter-spacing="1.5">SATISFACTION</text>
  <text x="546" y="137" font-size="24" font-family="'Space Grotesk',sans-serif" font-weight="700" fill="#fff">95%</text>
  <text x="546" y="155" font-size="7.5" fill="#ffd93d">↑ Client avg</text>

  <!-- Divider -->
  <line x1="136" y1="176" x2="680" y2="176" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

