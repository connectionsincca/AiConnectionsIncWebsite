    <!-- Jan -->
    <rect x="176" y="340" width="34" height="0" rx="3" fill="url(#bar-b)">
      <animate attributeName="height" from="0" to="88" dur="1s" begin="0.3s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1"/>
      <animate attributeName="y" from="340" to="252" dur="1s" begin="0.3s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1"/>
