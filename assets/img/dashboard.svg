  <line x1="162" y1="204" x2="162" y2="340" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <!-- X-axis -->
  <line x1="162" y1="340" x2="530" y2="340" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <!-- Y gridlines -->
  <line x1="162" y1="249" x2="530" y2="249" stroke="rgba(255,255,255,0.04)" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="162" y1="294" x2="530" y2="294" stroke="rgba(255,255,255,0.04)" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- Y labels -->
  <text x="158" y="207" text-anchor="end" font-size="7" fill="rgba(255,255,255,0.2)">600</text>
  <text x="158" y="252" text-anchor="end" font-size="7" fill="rgba(255,255,255,0.2)">400</text>
  <text x="158" y="297" text-anchor="end" font-size="7" fill="rgba(255,255,255,0.2)">200</text>

