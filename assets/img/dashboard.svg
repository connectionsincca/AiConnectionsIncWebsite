  <rect x="14" y="318" width="88" height="5" rx="2.5" fill="rgba(255,255,255,0.05)"/>
  <rect x="14" y="318" width="0" height="5" rx="2.5" fill="#4d96ff" opacity="0.75">
    <animate attributeName="width" from="0" to="78" dur="1.8s" begin="0.4s" fill="freeze"/>
  </rect>
  <text x="106" y="323" font-size="6.5" fill="rgba(77,150,255,0.7)">89%</text>

  <rect x="14" y="332" width="88" height="5" rx="2.5" fill="rgba(255,255,255,0.05)"/>
  <rect x="14" y="332" width="0" height="5" rx="2.5" fill="#c77dff" opacity="0.75">
    <animate attributeName="width" from="0" to="58" dur="1.8s" begin="0.7s" fill="freeze"/>
  </rect>
  <text x="106" y="337" font-size="6.5" fill="rgba(199,125,255,0.7)">66%</text>

  <rect x="14" y="346" width="88" height="5" rx="2.5" fill="rgba(255,255,255,0.05)"/>
  <rect x="14" y="346" width="0" height="5" rx="2.5" fill="#6bcb77" opacity="0.75">
    <animate attributeName="width" from="0" to="72" dur="1.8s" begin="1.0s" fill="freeze"/>
  </rect>
  <text x="106" y="351" font-size="6.5" fill="rgba(107,203,119,0.7)">82%</text>

  <text x="14" y="318" dx="0" dy="18" font-size="7" fill="rgba(255,255,255,0.14)">CPU</text>
  <text x="14" y="332" dx="0" dy="18" font-size="7" fill="rgba(255,255,255,0.14)">MEM</text>
  <text x="14" y="346" dx="0" dy="18" font-size="7" fill="rgba(255,255,255,0.14)">API</text>

  <!-- ── Main area ── -->
  <rect x="118" y="38" width="581" height="402" fill="#08080e"/>

  <!-- Section title -->
  <text x="136" y="64" font-size="11" fill="rgba(255,255,255,0.7)" letter-spacing="1" font-weight="600">Overview</text>
  <text x="136" y="79" font-size="8" fill="rgba(255,255,255,0.25)" letter-spacing="1">Real-time AI performance metrics</text>

  <!-- ── Metric cards ── -->
  <!-- Card 1: Revenue -->
  <rect x="136" y="92" width="120" height="72" rx="8" fill="rgba(77,150,255,0.07)" stroke="rgba(77,150,255,0.2)" stroke-width="1"/>
  <rect x="136" y="92" width="120" height="3" rx="1.5" fill="#4d96ff" opacity="0.5"/>
  <text x="150" y="111" font-size="7.5" fill="rgba(255,255,255,0.35)" letter-spacing="1.5">REVENUE</text>
  <text x="150" y="137" font-size="24" font-family="'Space Grotesk',sans-serif" font-weight="700" fill="#fff">+28%</text>
  <text x="150" y="155" font-size="7.5" fill="#4d96ff">↑ vs last quarter</text>

  <!-- Card 2: Automations -->
  <rect x="268" y="92" width="120" height="72" rx="8" fill="rgba(199,125,255,0.07)" stroke="rgba(199,125,255,0.2)" stroke-width="1"/>
  <rect x="268" y="92" width="120" height="3" rx="1.5" fill="#c77dff" opacity="0.5"/>
  <text x="282" y="111" font-size="7.5" fill="rgba(255,255,255,0.35)" letter-spacing="1.5">AUTOMATIONS</text>
  <text x="282" y="137" font-size="24" font-family="'Space Grotesk',sans-serif" font-weight="700" fill="#fff">1,847</text>
  <text x="282" y="155" font-size="7.5" fill="#c77dff">↑ Active daily</text>

