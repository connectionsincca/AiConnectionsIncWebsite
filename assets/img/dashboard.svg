<svg viewBox="0 0 700 440" xmlns="http://www.w3.org/2000/svg" font-family="'DM Mono',monospace">
<defs>
  <filter id="dg"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="dg2"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <linearGradient id="bar-b" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#4d96ff" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#4d96ff" stop-opacity="0.3"/>
  </linearGradient>
  <linearGradient id="bar-v" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#c77dff" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#c77dff" stop-opacity="0.3"/>
  </linearGradient>
  <linearGradient id="bar-c" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#6bcb77" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#6bcb77" stop-opacity="0.3"/>
  </linearGradient>
  <linearGradient id="line-g" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#4d96ff"/>
    <stop offset="100%" stop-color="#c77dff"/>
  </linearGradient>
  <clipPath id="chartclip"><rect x="148" y="230" width="380" height="140"/></clipPath>
  <clipPath id="win"><rect x="1" y="38" width="698" height="401" rx="0"/></clipPath>
</defs>

<!-- ── Window shell ── -->
<rect width="700" height="440" rx="14" fill="#08080f" stroke="rgba(255,255,255,0.09)" stroke-width="1"/>
<!-- Titlebar -->
<rect width="700" height="38" rx="14" fill="#0d0d1e"/>
<rect y="26" width="700" height="12" fill="#0d0d1e"/>
<!-- Dots -->
<circle cx="22" cy="19" r="5.5" fill="#ff5f5a" opacity="0.8"/>
<circle cx="42" cy="19" r="5.5" fill="#febc2e" opacity="0.8"/>
<circle cx="62" cy="19" r="5.5" fill="#28c840" opacity="0.8"/>
<!-- Title -->
<text x="350" y="24" text-anchor="middle" font-size="9.5" fill="rgba(255,255,255,0.28)" letter-spacing="3">AI ANALYTICS — AI.CONNECTIONSINC</text>
<!-- Blink cursor -->
<rect x="522" y="15" width="5" height="8" fill="rgba(77,150,255,0.6)" rx="1">
  <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
</rect>

<g clip-path="url(#win)">
  <!-- ── Left sidebar ── -->
  <rect x="1" y="38" width="116" height="402" fill="#0b0b1a"/>
  <line x1="117" y1="38" x2="117" y2="440" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Active nav item -->
  <rect x="1" y="58" width="3" height="22" fill="#4d96ff" rx="1.5"/>
  <rect x="8" y="56" width="108" height="26" rx="6" fill="rgba(77,150,255,0.09)"/>
  <text x="24" y="73" font-size="8.5" fill="rgba(255,255,255,0.7)" letter-spacing="1">OVERVIEW</text>

  <text x="24" y="104" font-size="8" fill="rgba(255,255,255,0.22)" letter-spacing="1">REPORTS</text>
  <text x="24" y="124" font-size="8" fill="rgba(255,255,255,0.22)" letter-spacing="1">AUTOMATION</text>
  <text x="24" y="144" font-size="8" fill="rgba(255,255,255,0.22)" letter-spacing="1">ANALYTICS</text>
  <text x="24" y="164" font-size="8" fill="rgba(255,255,255,0.22)" letter-spacing="1">CLIENTS</text>
  <text x="24" y="184" font-size="8" fill="rgba(255,255,255,0.22)" letter-spacing="1">SETTINGS</text>

  <!-- Sidebar health bars -->
