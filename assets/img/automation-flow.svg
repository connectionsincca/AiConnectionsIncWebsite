<svg viewBox="0 0 760 320" xmlns="http://www.w3.org/2000/svg" font-family="'DM Mono',monospace">
<defs>
  <filter id="fg"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="fg2"><feGaussianBlur stdDeviation="12" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <linearGradient id="pipe-g" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#4d96ff" stop-opacity="0.7"/>
    <stop offset="100%" stop-color="#c77dff" stop-opacity="0.7"/>
  </linearGradient>
  <linearGradient id="out-g" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#c77dff"/>
    <stop offset="100%" stop-color="#6bcb77"/>
  </linearGradient>
  <radialGradient id="ai-core" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#7ab4ff"/>
    <stop offset="40%" stop-color="#4d96ff"/>
    <stop offset="100%" stop-color="#2a60cc"/>
  </radialGradient>
  <radialGradient id="hub-glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="rgba(77,150,255,0.3)"/>
    <stop offset="100%" stop-color="rgba(77,150,255,0)"/>
  </radialGradient>
</defs>

<!-- Background -->
<rect width="760" height="320" fill="#03010a" rx="16"/>
<rect width="760" height="320" rx="16" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

<!-- Subtle grid -->
<g stroke="rgba(255,255,255,0.02)" stroke-width="0.5">
  <line x1="0" y1="80" x2="760" y2="80"/>
  <line x1="0" y1="160" x2="760" y2="160"/>
  <line x1="0" y1="240" x2="760" y2="240"/>
  <line x1="190" y1="0" x2="190" y2="320"/>
  <line x1="380" y1="0" x2="380" y2="320"/>
  <line x1="570" y1="0" x2="570" y2="320"/>
</g>

<!-- ═══════════════════════════════════════════ -->
<!-- STAGE 1: Raw Data inputs (left) -->
<!-- ═══════════════════════════════════════════ -->
<text x="28" y="24" font-size="8" fill="rgba(255,255,255,0.22)" letter-spacing="2">STAGE 1</text>
<text x="28" y="37" font-size="9.5" fill="rgba(255,255,255,0.45)" letter-spacing="1">RAW DATA</text>

<!-- Input box 1: Emails -->
<rect x="20" y="55" width="130" height="44" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(77,150,255,0.25)" stroke-width="1"/>
<text x="34" y="72" font-size="8" fill="rgba(255,255,255,0.4)" letter-spacing="0.5">📧 EMAILS</text>
<text x="34" y="86" font-size="7" fill="rgba(77,150,255,0.55)">2,840 unread</text>

<!-- Input box 2: Spreadsheets -->
<rect x="20" y="108" width="130" height="44" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(77,150,255,0.25)" stroke-width="1"/>
<text x="34" y="125" font-size="8" fill="rgba(255,255,255,0.4)" letter-spacing="0.5">📊 SHEETS</text>
<text x="34" y="139" font-size="7" fill="rgba(77,150,255,0.55)">14 reports</text>

<!-- Input box 3: Customer data -->
<rect x="20" y="161" width="130" height="44" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(77,150,255,0.25)" stroke-width="1"/>
<text x="34" y="178" font-size="8" fill="rgba(255,255,255,0.4)" letter-spacing="0.5">👥 CRM DATA</text>
<text x="34" y="192" font-size="7" fill="rgba(77,150,255,0.55)">1,200 records</text>

<!-- Input box 4: Documents -->
<rect x="20" y="214" width="130" height="44" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(77,150,255,0.25)" stroke-width="1"/>
<text x="34" y="231" font-size="8" fill="rgba(255,255,255,0.4)" letter-spacing="0.5">📄 DOCS</text>
<text x="34" y="245" font-size="7" fill="rgba(77,150,255,0.55)">380 files</text>

<!-- ═══════════════════════════════════════════ -->
<!-- CONNECTORS: Input → AI (funnel lines) -->
<!-- ═══════════════════════════════════════════ -->
<path d="M150,77  C200,77  220,160 270,160" fill="none" stroke="rgba(77,150,255,0.3)" stroke-width="1.2"/>
<path d="M150,130 C200,130 220,160 270,160" fill="none" stroke="rgba(77,150,255,0.3)" stroke-width="1.2"/>
<path d="M150,183 C200,183 220,160 270,160" fill="none" stroke="rgba(77,150,255,0.3)" stroke-width="1.2"/>
<path d="M150,236 C200,236 220,160 270,160" fill="none" stroke="rgba(77,150,255,0.3)" stroke-width="1.2"/>

<!-- Animated particles into AI -->
<circle r="4" fill="#4d96ff" filter="url(#fg)">
  <animateMotion path="M150,77 C200,77 220,160 270,160" dur="1.8s" repeatCount="indefinite" begin="0s"/>
</circle>
<circle r="3" fill="#4d96ff" filter="url(#fg)" opacity="0.7">
  <animateMotion path="M150,130 C200,130 220,160 270,160" dur="2.1s" repeatCount="indefinite" begin="0.6s"/>
</circle>
<circle r="4" fill="#4d96ff" filter="url(#fg)">
  <animateMotion path="M150,183 C200,183 220,160 270,160" dur="1.9s" repeatCount="indefinite" begin="1.1s"/>
</circle>
<circle r="3" fill="#4d96ff" filter="url(#fg)" opacity="0.7">
  <animateMotion path="M150,236 C200,236 220,160 270,160" dur="2.3s" repeatCount="indefinite" begin="0.4s"/>
</circle>

<!-- ═══════════════════════════════════════════ -->
<!-- STAGE 2: AI Engine (center) -->
<!-- ═══════════════════════════════════════════ -->
<text x="290" y="24" font-size="8" fill="rgba(255,255,255,0.22)" letter-spacing="2">STAGE 2</text>
<text x="290" y="37" font-size="9.5" fill="rgba(255,255,255,0.45)" letter-spacing="1">AI ENGINE</text>

<!-- AI hub glow -->
<circle cx="380" cy="160" r="75" fill="url(#hub-glow)" filter="url(#fg2)">
  <animate attributeName="r" values="75;88;75" dur="3s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.8;0.4;0.8" dur="3s" repeatCount="indefinite"/>
</circle>

<!-- AI core hexagonal frame -->
<polygon points="380,105 424,130 424,190 380,215 336,190 336,130"
  fill="rgba(77,150,255,0.08)"
  stroke="rgba(77,150,255,0.35)"
  stroke-width="1.5">
  <animate attributeName="stroke-opacity" values="0.35;0.65;0.35" dur="2.5s" repeatCount="indefinite"/>
</polygon>
<!-- Inner ring -->
<polygon points="380,120 416,141 416,179 380,200 344,179 344,141"
  fill="rgba(77,150,255,0.05)"
  stroke="rgba(77,150,255,0.2)"
  stroke-width="1">
  <animateTransform attributeName="transform" type="rotate" from="0 380 160" to="360 380 160" dur="22s" repeatCount="indefinite"/>
</polygon>

<!-- AI brain icon (simplified circuit) -->
<circle cx="380" cy="160" r="28" fill="url(#ai-core)" filter="url(#fg)">
  <animate attributeName="opacity" values="0.9;1;0.9" dur="2s" repeatCount="indefinite"/>
  <animate attributeName="r" values="27;30;27" dur="2s" repeatCount="indefinite"/>
</circle>
<!-- Brain circuit lines -->
<g stroke="rgba(10,20,50,0.6)" stroke-width="1.4" stroke-linecap="round" fill="none">
  <path d="M370,155 L370,165 L378,165"/>
  <path d="M390,155 L390,165 L382,165"/>
  <path d="M375,152 L375,148"/>
  <path d="M385,152 L385,148"/>
  <circle cx="375" cy="148" r="2" fill="rgba(10,20,50,0.6)" stroke="none"/>
  <circle cx="385" cy="148" r="2" fill="rgba(10,20,50,0.6)" stroke="none"/>
  <path d="M365,160 L358,160"/>
  <path d="M395,160 L402,160"/>
  <circle cx="356" cy="160" r="2" fill="rgba(10,20,50,0.6)" stroke="none"/>
  <circle cx="404" cy="160" r="2" fill="rgba(10,20,50,0.6)" stroke="none"/>
  <path d="M369,170 L365,174"/>
  <path d="M391,170 L395,174"/>
</g>
<!-- AI text -->
<text x="380" y="196" text-anchor="middle" font-size="7.5" fill="rgba(255,255,255,0.5)" letter-spacing="2">PROCESSING</text>

<!-- Orbiting data dots -->
<circle r="3.5" fill="#a8caff" filter="url(#fg)">
  <animateMotion path="M0,0 m-52,0 a52,52 0 1,1 104,0 a52,52 0 1,1 -104,0" dur="6s" repeatCount="indefinite"/>
  <animateTransform attributeName="transform" type="translate" values="" additive="sum"/>
  <!-- override with absolute positioning -->
</circle>
<circle cx="380" cy="160" r="0">
  <!-- Orbit workaround using translate -->
</circle>
<!-- Using rotateTransform on group for orbit -->
<g>
  <circle cx="432" cy="160" r="3.5" fill="#a8caff" filter="url(#fg)">
    <animateTransform attributeName="transform" type="rotate" from="0 380 160" to="360 380 160" dur="5.5s" repeatCount="indefinite"/>
  </circle>
</g>
<g>
  <circle cx="380" cy="108" r="3" fill="#d4a8ff" filter="url(#fg)">
    <animateTransform attributeName="transform" type="rotate" from="0 380 160" to="-360 380 160" dur="7s" repeatCount="indefinite"/>
  </circle>
</g>
<g>
  <circle cx="328" cy="160" r="2.5" fill="#60e8ff" filter="url(#fg)">
    <animateTransform attributeName="transform" type="rotate" from="0 380 160" to="360 380 160" dur="9s" repeatCount="indefinite"/>
  </circle>
</g>

<!-- ═══════════════════════════════════════════ -->
<!-- CONNECTORS: AI → Outputs -->
<!-- ═══════════════════════════════════════════ -->
<path d="M490,160 C530,160 540,77  600,77"  fill="none" stroke="rgba(199,125,255,0.3)" stroke-width="1.2"/>
<path d="M490,160 C530,160 540,130 600,130" fill="none" stroke="rgba(199,125,255,0.3)" stroke-width="1.2"/>
<path d="M490,160 C530,160 540,183 600,183" fill="none" stroke="rgba(107,203,119,0.3)" stroke-width="1.2"/>
<path d="M490,160 C530,160 540,236 600,236" fill="none" stroke="rgba(107,203,119,0.3)" stroke-width="1.2"/>

<!-- AI → output particles -->
<circle r="4" fill="#c77dff" filter="url(#fg)">
  <animateMotion path="M490,160 C530,160 540,77 600,77" dur="1.7s" repeatCount="indefinite" begin="0.3s"/>
</circle>
<circle r="3.5" fill="#c77dff" filter="url(#fg)" opacity="0.8">
  <animateMotion path="M490,160 C530,160 540,130 600,130" dur="2s" repeatCount="indefinite" begin="0.9s"/>
</circle>
<circle r="4" fill="#6bcb77" filter="url(#fg)">
  <animateMotion path="M490,160 C530,160 540,183 600,183" dur="1.9s" repeatCount="indefinite" begin="0.2s"/>
</circle>
<circle r="3.5" fill="#6bcb77" filter="url(#fg)" opacity="0.8">
  <animateMotion path="M490,160 C530,160 540,236 600,236" dur="2.2s" repeatCount="indefinite" begin="1.3s"/>
</circle>

<!-- Main pipe (AI in/out) -->
<line x1="270" y1="160" x2="336" y2="160" stroke="url(#pipe-g)" stroke-width="2.5"/>
<line x1="424" y1="160" x2="490" y2="160" stroke="url(#out-g)" stroke-width="2.5"/>

<!-- ═══════════════════════════════════════════ -->
<!-- STAGE 3: Outputs (right) -->
<!-- ═══════════════════════════════════════════ -->
<text x="600" y="24" font-size="8" fill="rgba(255,255,255,0.22)" letter-spacing="2">STAGE 3</text>
<text x="600" y="37" font-size="9.5" fill="rgba(255,255,255,0.45)" letter-spacing="1">OUTCOMES</text>

<!-- Output 1: Reports -->
<rect x="600" y="55" width="138" height="44" rx="8" fill="rgba(199,125,255,0.07)" stroke="rgba(199,125,255,0.3)" stroke-width="1">
  <animate attributeName="stroke-opacity" values="0.3;0.6;0.3" dur="2.5s" repeatCount="indefinite" begin="0.3s"/>
</rect>
<text x="614" y="72" font-size="8" fill="rgba(255,255,255,0.5)" letter-spacing="0.5">📈 REPORTS</text>
<text x="614" y="87" font-size="7" fill="rgba(199,125,255,0.65)">Auto-generated</text>

<!-- Output 2: Scheduling -->
<rect x="600" y="108" width="138" height="44" rx="8" fill="rgba(199,125,255,0.07)" stroke="rgba(199,125,255,0.3)" stroke-width="1">
  <animate attributeName="stroke-opacity" values="0.3;0.6;0.3" dur="2.8s" repeatCount="indefinite" begin="0.6s"/>
</rect>
<text x="614" y="125" font-size="8" fill="rgba(255,255,255,0.5)" letter-spacing="0.5">🗓 SCHEDULING</text>
<text x="614" y="139" font-size="7" fill="rgba(199,125,255,0.65)">Tasks assigned</text>

<!-- Output 3: Customer responses -->
<rect x="600" y="161" width="138" height="44" rx="8" fill="rgba(107,203,119,0.07)" stroke="rgba(107,203,119,0.3)" stroke-width="1">
  <animate attributeName="stroke-opacity" values="0.3;0.6;0.3" dur="2.2s" repeatCount="indefinite" begin="0.2s"/>
</rect>
<text x="614" y="178" font-size="8" fill="rgba(255,255,255,0.5)" letter-spacing="0.5">💬 RESPONSES</text>
<text x="614" y="192" font-size="7" fill="rgba(107,203,119,0.65)">Sent instantly</text>

<!-- Output 4: Insights -->
<rect x="600" y="214" width="138" height="44" rx="8" fill="rgba(107,203,119,0.07)" stroke="rgba(107,203,119,0.3)" stroke-width="1">
  <animate attributeName="stroke-opacity" values="0.3;0.6;0.3" dur="3s" repeatCount="indefinite" begin="1s"/>
</rect>
<text x="614" y="231" font-size="8" fill="rgba(255,255,255,0.5)" letter-spacing="0.5">🧠 INSIGHTS</text>
<text x="614" y="245" font-size="7" fill="rgba(107,203,119,0.65)">Trends surfaced</text>

<!-- ── Bottom label ── -->
<text x="380" y="298" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.18)" letter-spacing="2">AI.CONNECTIONSINC — INTELLIGENT BUSINESS AUTOMATION</text>

<!-- Throughput indicator -->
<rect x="290" y="278" width="180" height="18" rx="5" fill="rgba(77,150,255,0.06)" stroke="rgba(77,150,255,0.15)" stroke-width="0.8"/>
<rect x="292" y="280" width="0" height="14" rx="4" fill="rgba(77,150,255,0.5)">
  <animate attributeName="width" values="0;170;0" dur="4s" repeatCount="indefinite"/>
</rect>
<text x="380" y="291" text-anchor="middle" font-size="7" fill="rgba(77,150,255,0.6)" letter-spacing="1">PROCESSING 1,847 TASKS / DAY</text>

</svg>
